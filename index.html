<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heart Wave Artwork</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <script defer src="./sketch.js"></script>
  </head>
  <body>
    <main class="hud">
      <div class="hud__row">
        <span>Source:</span>
        <strong id="sourceLabel">simulation</strong>
      </div>
      <div class="hud__row">
        <span>BPM:</span>
        <strong id="bpmLabel">--</strong>
      </div>
      <div class="hud__row">
        <span>WS:</span>
        <strong id="wsLabel">disconnected</strong>
      </div>
      <div class="hud__help">
        Press <kbd>W</kbd> to toggle simulation / WebSocket
      </div>
    </main>
  </body>
</html>
